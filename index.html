<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>コード照合スキャナー</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --accent: #00e5a0;
    --accent-dim: #00e5a022; --ok: #00e5a0; --ng: #ff4466;
    --text: #e8e8f0; --text-dim: #7070a0; --border: #2e2e42; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }
  header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; font-size: 16px; }
  header h1 { font-size: 17px; font-weight: 700; }
  .mode-tabs { display: flex; gap: 8px; padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 10px 0; border: 1.5px solid var(--border); background: transparent; color: var(--text-dim); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; max-width: 480px; width: 100%; margin: 0 auto; }
  .camera-wrap { position: relative; background: #000; border-radius: var(--radius); overflow: hidden; border: 1.5px solid var(--border); aspect-ratio: 4/3; }
  .camera-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-ph { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-dim); font-size: 13px; }
  .cam-ph .icon { font-size: 40px; }
  .frame-ov { position: absolute; inset: 0; pointer-events: none; }
  .frame-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 75%; aspect-ratio: 3/1; border: 2px solid var(--accent); border-radius: 8px; }
  .scan-line { position: absolute; left: 12.5%; right: 12.5%; height: 1.5px; background: linear-gradient(90deg,transparent,var(--accent),transparent); animation: sl 2s ease-in-out infinite; }
  @keyframes sl { 0%{top:25%;opacity:0} 10%{opacity:1} 90%{opacity:1;top:75%} 100%{top:75%;opacity:0} }
  .result-ov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 72px; font-weight: 900; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .result-ov.show { opacity: 1; }
  .result-ov.ok { background: rgba(0,229,160,0.25); color: var(--ok); }
  .result-ov.ng { background: rgba(255,68,102,0.25); color: var(--ng); }
  .scan-btn { width: 100%; padding: 16px; background: var(--accent); color: #0a0a0f; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 800; cursor: pointer; }
  .scan-btn.stop { background: var(--ng); color: #fff; }
  .status-area { display: flex; flex-direction: column; gap: 10px; }
  .slot { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: border-color 0.3s; }
  .slot.filled { border-color: var(--accent); }
  .slot.master { border-color: #7070ff; }
  .slot-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; min-width: 52px; }
  .slot-value { flex: 1; font-size: 14px; font-weight: 600; word-break: break-all; font-family: monospace; }
  .slot-value.empty { color: var(--text-dim); font-family: inherit; font-weight: 400; font-size: 13px; }
  .slot-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .slot-dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .slot-dot.mon { background: #7070ff; box-shadow: 0 0 6px #7070ff; }
  .result-banner { border-radius: var(--radius); padding: 18px; text-align: center; display: none; flex-direction: column; gap: 4px; }
  .result-banner.show { display: flex; }
  .result-banner.ok { background: rgba(0,229,160,0.12); border: 1.5px solid var(--ok); }
  .result-banner.ng { background: rgba(255,68,102,0.12); border: 1.5px solid var(--ng); }
  .result-big { font-size: 32px; font-weight: 900; }
  .result-banner.ok .result-big { color: var(--ok); }
  .result-banner.ng .result-big { color: var(--ng); }
  .result-sub { font-size: 12px; color: var(--text-dim); }
  .history-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .hbadge { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 6px; flex-shrink: 0; }
  .hbadge.ok { background: rgba(0,229,160,0.15); color: var(--ok); }
  .hbadge.ng { background: rgba(255,68,102,0.15); color: var(--ng); }
  .hval { flex: 1; color: var(--text-dim); font-family: monospace; word-break: break-all; }
  .clear-btn { width: 100%; padding: 12px; background: transparent; color: var(--ng); border: 1.5px solid var(--ng); border-radius: var(--radius); font-size: 13px; font-weight: 700; cursor: pointer; }
  .instruction { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.6; }
  canvas { display: none; }
</style>
</head>
<body>
<header>
  <div class="logo">📷</div>
  <h1>コード照合スキャナー</h1>
</header>
<div class="mode-tabs">
  <button class="tab active" id="tab1" onclick="switchMode('one')">1 対 1</button>
  <button class="tab" id="tabN" onclick="switchMode('many')">1 対 N</button>
</div>

<main id="main-one">
  <div class="camera-wrap">
    <div class="cam-ph" id="ph1"><div class="icon">📷</div><div>スキャン開始を押してください</div></div>
    <video id="v1" playsinline autoplay muted style="display:none"></video>
    <div class="frame-ov" id="fo1" style="display:none"><div class="frame-box"></div><div class="scan-line"></div></div>
    <div class="result-ov" id="ro1"></div>
  </div>
  <canvas id="c1"></canvas>
  <button class="scan-btn" id="sb1" onclick="toggle1()">📷 スキャン開始</button>
  <div class="status-area">
    <div class="slot" id="slot1"><span class="slot-label">1本目</span><span class="slot-value empty" id="sv1">未スキャン</span><span class="slot-dot" id="sd1"></span></div>
    <div class="slot" id="slot2"><span class="slot-label">2本目</span><span class="slot-value empty" id="sv2">1本目をスキャン後</span><span class="slot-dot" id="sd2"></span></div>
  </div>
  <div class="result-banner" id="rb1"><div class="result-big" id="rbt1"></div><div class="result-sub" id="rbs1"></div></div>
  <p class="instruction" id="ins1">スキャン開始を押してカメラを起動し、1本目のコードを読み取ってください</p>
</main>

<main id="main-many" style="display:none">
  <div class="camera-wrap">
    <div class="cam-ph" id="phN"><div class="icon">📷</div><div>スキャン開始を押してください</div></div>
    <video id="vN" playsinline autoplay muted style="display:none"></video>
    <div class="frame-ov" id="foN" style="display:none"><div class="frame-box"></div><div class="scan-line"></div></div>
    <div class="result-ov" id="roN"></div>
  </div>
  <canvas id="cN"></canvas>
  <button class="scan-btn" id="sbN" onclick="toggleN()">📷 スキャン開始</button>
  <div class="status-area">
    <div class="slot" id="slotM"><span class="slot-label">マスター</span><span class="slot-value empty" id="svM">未登録</span><span class="slot-dot" id="sdM"></span></div>
  </div>
  <div id="histArea" style="display:none;flex-direction:column;gap:10px;">
    <span class="history-title">照合履歴</span>
    <div class="history-list" id="histList"></div>
  </div>
  <button class="clear-btn" onclick="clearMaster()">マスターをクリア</button>
  <p class="instruction" id="insN">スキャン開始を押し、最初に読み取ったコードがマスターとして登録されます</p>
</main>

<!-- QR用 -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<!-- 1次元バーコード用 -->
<script src="https://cdn.jsdelivr.net/npm/zbar-wasm@0.9.15/dist/zbar.min.js"></script>

<script>
let mode = 'one';
let on1 = false, onN = false;
let stream1 = null, streamN = null;
let raf1 = null, rafN = null;
let code1 = null, masterCode = null;
let history = [];
let last1 = null, lastN = null;
let zbarReady = false;

// zbar-wasm 初期化
if (typeof ZBar !== 'undefined') {
  ZBar.getDefaultScanner().then(() => { zbarReady = true; }).catch(()=>{});
}

function switchMode(m) {
  stop1(); stopN();
  mode = m;
  document.getElementById('main-one').style.display = m==='one'?'flex':'none';
  document.getElementById('main-many').style.display = m==='many'?'flex':'none';
  document.getElementById('tab1').classList.toggle('active', m==='one');
  document.getElementById('tabN').classList.toggle('active', m==='many');
}

async function scanFrame(canvas, video) {
  if (video.readyState < 2) return null;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // QRコード試行
  const qr = jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
  if (qr) return qr.data;

  // 1次元バーコード試行（zbar-wasm）
  if (zbarReady && typeof ZBar !== 'undefined') {
    try {
      const scanner = await ZBar.getDefaultScanner();
      const results = await scanner.scanImage(img);
      if (results && results.length > 0) return results[0].value;
    } catch(e) {}
  }

  return null;
}

// ---- 1対1 ----
async function toggle1() {
  if (on1) { stop1(); return; }
  try {
    stream1 = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:960}}});
    const v = document.getElementById('v1');
    v.srcObject = stream1; v.style.display='block';
    document.getElementById('ph1').style.display='none';
    document.getElementById('fo1').style.display='block';
    await v.play();
    on1 = true;
    const btn = document.getElementById('sb1');
    btn.textContent='⏹ スキャン停止'; btn.classList.add('stop');
    tick1();
  } catch(e) { alert('カメラ起動失敗: ' + e.message); }
}

async function tick1() {
  if (!on1) return;
  const result = await scanFrame(document.getElementById('c1'), document.getElementById('v1'));
  if (result && result !== last1) {
    last1 = result;
    handle1(result);
  }
  if (on1) raf1 = requestAnimationFrame(tick1);
}

function stop1() {
  on1 = false;
  if (raf1) { cancelAnimationFrame(raf1); raf1 = null; }
  if (stream1) { stream1.getTracks().forEach(t=>t.stop()); stream1 = null; }
  const v = document.getElementById('v1');
  v.srcObject = null; v.style.display='none';
  document.getElementById('ph1').style.display='flex';
  document.getElementById('fo1').style.display='none';
  const btn = document.getElementById('sb1');
  btn.textContent='📷 スキャン開始'; btn.classList.remove('stop');
}

function handle1(text) {
  if (!code1) {
    code1 = text;
    const sv = document.getElementById('sv1');
    sv.textContent = trunc(text,30); sv.classList.remove('empty');
    document.getElementById('slot1').classList.add('filled');
    document.getElementById('sd1').classList.add('on');
    document.getElementById('sv2').textContent='2本目をスキャン中...';
    document.getElementById('ins1').textContent='2本目のコードをスキャンしてください';
    document.getElementById('rb1').className='result-banner';
    // 少し待ってからlast1をリセット（同じコードを2本目として読めるように）
    setTimeout(()=>{ last1 = null; }, 1500);
  } else {
    const matched = code1 === text;
    showResult1(matched, text);
    setTimeout(()=>{
      code1=null; last1=null;
      resetSlots1();
      document.getElementById('rb1').className='result-banner';
      document.getElementById('ro1').className='result-ov';
      document.getElementById('ins1').textContent='次の1本目をスキャンしてください';
    }, 3000);
  }
}

function showResult1(ok, t2) {
  const ro = document.getElementById('ro1');
  ro.className = 'result-ov show '+(ok?'ok':'ng');
  ro.textContent = ok?'OK':'NG';
  const rb = document.getElementById('rb1');
  rb.className = 'result-banner show '+(ok?'ok':'ng');
  document.getElementById('rbt1').textContent = ok?'✓ 一致':'✗ 不一致';
  document.getElementById('rbs1').textContent = ok?'2つのコードが一致しました':`1: ${trunc(code1||'',14)} / 2: ${trunc(t2,14)}`;
  playBeep(ok);
  setTimeout(()=>{ ro.className='result-ov'; }, 2500);
}

function resetSlots1() {
  const sv1=document.getElementById('sv1'), sv2=document.getElementById('sv2');
  sv1.textContent='未スキャン'; sv1.classList.add('empty');
  sv2.textContent='1本目をスキャン後'; sv2.classList.add('empty');
  document.getElementById('slot1').classList.remove('filled');
  document.getElementById('slot2').classList.remove('filled');
  document.getElementById('sd1').classList.remove('on');
  document.getElementById('sd2').classList.remove('on');
}

// ---- 1対N ----
async function toggleN() {
  if (onN) { stopN(); return; }
  try {
    streamN = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:960}}});
    const v = document.getElementById('vN');
    v.srcObject = streamN; v.style.display='block';
    document.getElementById('phN').style.display='none';
    document.getElementById('foN').style.display='block';
    await v.play();
    onN = true;
    const btn = document.getElementById('sbN');
    btn.textContent='⏹ スキャン停止'; btn.classList.add('stop');
    tickN();
  } catch(e) { alert('カメラ起動失敗: ' + e.message); }
}

async function tickN() {
  if (!onN) return;
  const result = await scanFrame(document.getElementById('cN'), document.getElementById('vN'));
  if (result && result !== lastN) {
    lastN = result;
    handleN(result);
  }
  if (onN) rafN = requestAnimationFrame(tickN);
}

function stopN() {
  onN = false;
  if (rafN) { cancelAnimationFrame(rafN); rafN = null; }
  if (streamN) { streamN.getTracks().forEach(t=>t.stop()); streamN = null; }
  const v = document.getElementById('vN');
  v.srcObject = null; v.style.display='none';
  document.getElementById('phN').style.display='flex';
  document.getElementById('foN').style.display='none';
  const btn = document.getElementById('sbN');
  btn.textContent='📷 スキャン開始'; btn.classList.remove('stop');
}

function handleN(text) {
  if (!masterCode) {
    masterCode = text;
    const sv = document.getElementById('svM');
    sv.textContent = trunc(text,30); sv.classList.remove('empty');
    document.getElementById('slotM').classList.add('master');
    document.getElementById('sdM').classList.add('mon');
    document.getElementById('insN').textContent='照合するコードをスキャンしてください';
    document.getElementById('histArea').style.display='flex';
    setTimeout(()=>{ lastN=null; }, 1500);
  } else {
    const matched = masterCode === text;
    history.unshift({ok:matched, code:text, time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
    renderHistory();
    flashN(matched);
    playBeep(matched);
    setTimeout(()=>{ lastN=null; }, 2000);
  }
}

function flashN(ok) {
  const ro = document.getElementById('roN');
  ro.className = 'result-ov show '+(ok?'ok':'ng');
  ro.textContent = ok?'OK':'NG';
  setTimeout(()=>{ ro.className='result-ov'; }, 1500);
}

function renderHistory() {
  document.getElementById('histList').innerHTML = history.slice(0,20).map(h=>`
    <div class="history-item">
      <span class="hbadge ${h.ok?'ok':'ng'}">${h.ok?'OK':'NG'}</span>
      <span class="hval">${trunc(h.code,24)}</span>
      <span style="color:var(--text-dim);font-size:11px;flex-shrink:0">${h.time}</span>
    </div>`).join('');
}

function clearMaster() {
  stopN(); masterCode=null; history=[]; lastN=null;
  const sv=document.getElementById('svM');
  sv.textContent='未登録'; sv.classList.add('empty');
  document.getElementById('slotM').classList.remove('master');
  document.getElementById('sdM').classList.remove('mon');
  document.getElementById('histArea').style.display='none';
  document.getElementById('histList').innerHTML='';
  document.getElementById('roN').className='result-ov';
  document.getElementById('insN').textContent='スキャン開始を押し、最初に読み取ったコードがマスターとして登録されます';
}

function trunc(s,n){ return s.length>n?s.slice(0,n)+'…':s; }

function playBeep(ok) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = ok?880:330; o.type = ok?'sine':'square';
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    o.start(); o.stop(ctx.currentTime+0.4);
  } catch(e){}
}
</script>
</body>
</html>
